<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream v2.0 | Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Добавляем Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <aside class="glass-sidebar">
            <div class="logo">EduStream <span>PRO</span></div>
            <nav>
                <button class="nav-item active" data-view="students">Студенты</button>
                <button class="nav-item" data-view="analytics">Аналитика</button>
            </nav>
            <div class="system-status">
                <p>База данных: <span id="dbStatus">Supabase</span></p>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar glass-card">
                <input type="text" id="studentSearch" placeholder="Поиск по фамилии...">
                <div class="user-profile">Администратор</div>
            </header>

            <!-- Блок студентов (видим по умолчанию) -->
            <div id="studentsView">
                <div class="stats-grid">
                    <div class="stat-card glass-card">
                        <h4>Всего студентов</h4>
                        <p id="countAll">0</p>
                    </div>
                    <div class="stat-card glass-card">
                        <h4>Средний балл</h4>
                        <p id="avgGrade">0.0</p>
                    </div>
                </div>

                <div class="action-panel glass-card">
                    <h3>Регистрация студента</h3>
                    <form id="studentForm">
                        <input type="text" id="name" placeholder="Имя Фамилия" required>
                        <input type="number" id="grade" placeholder="Оценка (1-5)" min="1" max="5" required>
                        <button type="submit" class="btn-primary">Добавить в систему</button>
                    </form>
                </div>

                <div class="table-wrapper glass-card">
                    <table id="studentsTable">
                        <thead>
                            <tr><th>ID</th><th>ФИО</th><th>Успеваемость</th><th>Действия</th></tr>
                        </thead>
                        <tbody id="studentList"></tbody>
                    </table>
                </div>
            </div>

            <!-- Блок аналитики (скрыт по умолчанию) -->
            <div id="analyticsView" style="display: none;">
                <div class="glass-card" style="padding: 20px;">
                    <h2>Аналитика успеваемости</h2>
                    <canvas id="gradeChart" width="400" height="200"></canvas>
                </div>
            </div>
        </main>
    </div>
    <script src="lshs.js"></script>
</body>
</html>
